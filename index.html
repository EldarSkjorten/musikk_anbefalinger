<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Musikk-anbefalinger</title>
</head>
<body>
  <h1>Musikk-anbefalinger</h1>
  <div id="spiller"></div>
  <div id="lenker"></div>
  <button id="neste" onclick="visAnnen()">Vis en annen</button>

  <script>
    const plattformer = {
      spotify:      'Spotify',
      tidal:        'Tidal',
      youtubeMusic: 'YouTube Music',
      appleMusic:   'Apple Music',
      deezer:       'Deezer',
      amazonMusic:  'Amazon Music',
    };

    let songs = [];
    let forrige = -1;

    function hentAppleMusicUrl(embedKode) {
      const match = embedKode.match(/src="([^"]+)"/);
      if (!match) return null;
      return match[1].replace('embed.music.apple.com', 'music.apple.com');
    }

    function visLenker(data) {
      const lenkerDiv = document.getElementById('lenker');
      const linker = data.linksByPlatform;
      const html = Object.entries(plattformer)
        .filter(([key]) => linker[key])
        .map(([key, navn]) => `<a href="${linker[key].url}" target="_blank">${navn}</a>`)
        .join(' · ');
      lenkerDiv.innerHTML = html || '';
    }

    function visAnnen() {
      if (songs.length === 0) return;

      let indeks;
      do {
        indeks = Math.floor(Math.random() * songs.length);
      } while (indeks === forrige && songs.length > 1);

      forrige = indeks;
      document.getElementById('spiller').innerHTML = songs[indeks];
      document.getElementById('lenker').innerHTML = 'Henter lenker…';

      const appleUrl = hentAppleMusicUrl(songs[indeks]);
      if (!appleUrl) {
        document.getElementById('lenker').innerHTML = '';
        return;
      }

      fetch(`https://api.song.link/v1-alpha.1/links?url=${encodeURIComponent(appleUrl)}`)
        .then(r => r.json())
        .then(visLenker)
        .catch(() => {
          document.getElementById('lenker').innerHTML = '';
        });
    }

    fetch('songs.txt')
      .then(response => response.text())
      .then(text => {
        songs = text.split('\n').map(s => s.trim()).filter(s => s.length > 0);
        visAnnen();
      });
  </script>
</body>
</html>
