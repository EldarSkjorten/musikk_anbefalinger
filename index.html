<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Musikk-anbefalinger</title>
</head>
<body>
  <h1>Musikk-anbefalinger</h1>
  <div id="spiller"></div>

  <script>
    fetch('songs.txt')
      .then(response => response.text())
      .then(text => {
        const songs = text.split('\n').map(s => s.trim()).filter(s => s.length > 0);
        const tilfeldig = songs[Math.floor(Math.random() * songs.length)];
        document.getElementById('spiller').innerHTML = tilfeldig;
      });
  </script>
</body>
</html>
